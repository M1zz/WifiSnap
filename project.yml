name: WifiSnap
options:
  bundleIdPrefix: com.wifisnap
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"

targets:
  WifiSnap:
    type: application
    platform: iOS
    sources:
      - path: WifiSnap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wifisnap.app
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: WifiSnap/WifiSnap.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSCameraUsageDescription: "와이파이 안내판을 촬영해 아이디와 비밀번호를 인식합니다."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "현재 연결된 와이파이 이름을 확인하기 위해 필요합니다."
